name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            artifact: favors-linux-x64.tar.gz
            rust_target: ""
          - os: macos-14
            target: macos-x64
            artifact: favors-macos-x64.tar.gz
            rust_target: x86_64-apple-darwin
          - os: macos-14
            target: macos-arm64
            artifact: favors-macos-arm64.tar.gz
            rust_target: ""
          - os: windows-latest
            target: windows-x64
            artifact: favors-windows-x64.zip
            rust_target: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - run: npm run build:web

      - shell: bash
        run: |
          if [[ -n "${{ matrix.rust_target }}" ]]; then
            rustup target add "${{ matrix.rust_target }}"
            cargo build --release --manifest-path apps/daemon/Cargo.toml --target "${{ matrix.rust_target }}"
          else
            cargo build --release --manifest-path apps/daemon/Cargo.toml
          fi

      - shell: bash
        env:
          FAVORS_RUST_TARGET: ${{ matrix.rust_target }}
        run: scripts/package-release.sh "${{ matrix.target }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --notes "Favors release $TAG"
          gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
